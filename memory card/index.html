<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Match </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Custom Animated Cursor - Star Passing Effect -->
    <div class="custom-cursor" id="customCursor">
        <div class="cursor-star"></div>
    </div>
    <div class="cursor-trail" id="cursorTrail"></div>
    <div class="cursor-sparkle" id="cursorSparkle"></div>

    <!-- Animated Background -->
    <div class="background">
        <div class="stars"></div>
        <div class="twinkling"></div>
    </div>

    <!-- Main Menu -->
    <div class="menu" id="mainMenu">
        <h1 class="title">🧠 <span class="gradient-text">Memory Match</span></h1>
        <p class="subtitle">Match all the pairs to win!</p>

        <div class="game-buttons" id="gameButtons">
            <button onclick="startGame('memoryCard')" class="game-btn memory">
                <span class="btn-icon">🧠</span>Memory Match
                <span class="btn-desc">Card Matching</span>
            </button>
        </div>

        <div class="highscores">
            <h3>🏆 High Scores</h3>
            <div id="highScoreList"></div>
        </div>
    </div>

    <!-- Game UI -->
    <div class="game-ui" id="gameUI" style="display: none;">
        <div class="score-display">
            <span id="currentScore">Score: 0</span>
            <span id="highScoreDisplay">Best: 0</span>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div class="modal-overlay" id="gameOverModal" style="display: none;">
        <div class="modal">
            <h2 class="game-over-title">GAME OVER</h2>
            <p class="final-score" id="finalScore">Score: 0</p>
            <p class="new-highscore" id="newHighScore" style="display: none;">🎉 NEW HIGH SCORE! 🎉</p>
            <div class="modal-buttons">
                <button onclick="restartGame()" class="modal-btn">🔄 Play Again</button>
                <button onclick="goToMenu()" class="modal-btn menu-btn">⬅ Menu</button>
            </div>
        </div>
    </div>

    <!-- Back Button -->
    <button id="backBtn" onclick="goToMenu()" style="display: none;">⬅ Back to Menu</button>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Audio Manager -->
    <script src="components/audio.js"></script>
    <script src="components/soundManager.js"></script>

    <!-- Main JS -->
    <script src="main.js"></script>
    <footer style="text-align:center; padding:8px; font-size:14px; color:#f7f1f1;">done by ACash</footer>
</body>
</html>
